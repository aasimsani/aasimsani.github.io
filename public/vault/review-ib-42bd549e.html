<style>
  :root {
    --g-bg: #fdf8f0; --g-card: #f6efe1; --g-ink: #2a2520; --g-soft: #4a4339;

  }
  @media (prefers-color-scheme: dark) {
    :root { --g-bg: #181410; --g-card: #221c16; --g-ink: #f1e6d3; --g-soft: #c7baa3; --g-accent: #e08a6b; --g-fog: #3a302a; --g-stone: #8a7d6c; }
  }
  html { background: var(--g-bg); }
  body { margin: 0; font-family: system-ui, -apple-system, sans-serif; color: var(--g-ink); }
  .gate-wrap { min-height: 92vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .gate-card {
    max-width: 380px; width: 100%; background: var(--g-card);
    border: 1px solid var(--g-fog); border-radius: 1rem; padding: 2.2rem;
    text-align: center; box-sizing: border-box;
  }
  .gate-card .g-emoji { font-size: 2.6rem; }
  .gate-card h1 { font-family: Georgia, serif; font-weight: 500; font-size: 1.5rem; margin: 0.8rem 0 0.4rem; }
  .gate-card p { font-size: 0.9rem; color: var(--g-soft); margin: 0 0 1.4rem; }
  .gate-card input {
    width: 100%; box-sizing: border-box; padding: 0.7rem 0.9rem;
    border: 1px solid var(--g-fog); border-radius: 0.5rem;
    background: var(--g-bg); color: var(--g-ink); font: inherit; text-align: center;
  }
  .gate-card button {
    margin-top: 0.8rem; width: 100%; padding: 0.7rem;
    background: var(--g-accent); color: var(--g-bg); border: none;
    border-radius: 999px; font: inherit; font-weight: 600; cursor: pointer;
  }
  .gate-card button:disabled { opacity: 0.6; cursor: wait; }
  .gate-card .g-err { color: var(--g-accent); font-size: 0.85rem; min-height: 1.2em; margin-top: 0.7rem; }
  .gate-card .g-hint { font-size: 0.75rem; color: var(--g-stone); margin-top: 1.2rem; }
  input:focus-visible, button:focus-visible { outline: 2px solid var(--g-accent); outline-offset: 2px; }
</style>

function b64buf(s) { var bin = atob(s), a = new Uint8Array(bin.length); for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i); return a.buffer; }
async function unlock() {
  var pw = document.getElementById("gatePw").value;
  var err = document.getElementById("gateErr");
  var btn = document.getElementById("gateGo");
  if (!pw) return;
  btn.disabled = true; err.textContent = "";
  try {
    var mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64buf(PAYLOAD.salt), iterations: 310000, hash: "SHA-256" },
      mat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    var plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64buf(PAYLOAD.iv) }, key, b64buf(PAYLOAD.data));
    document.getElementById("content").innerHTML = new TextDecoder().decode(plain);
    document.getElementById("gate").remove();
    initApp();
    window.scrollTo(0, 0);
  } catch (e) {
    err.textContent = "That password didn\u2019t work \u2014 check with Aasim.";
    btn.disabled = false;
  }
}
document.getElementById("gateGo").addEventListener("click", unlock);
document.getElementById("gatePw").addEventListener("keydown", function (e) { if (e.key === "Enter") unlock(); });
function initApp() {

(function () {
  "use strict";
  var KEY = "ibrev.notes.v1";
  var CHECK_KEY = "ibrev.rituals.v1";

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch (e) { return []; }
  }
  function save(notes) {
    try { localStorage.setItem(KEY, JSON.stringify(notes)); } catch (e) { /* private mode */ }
  }
  var notes = load();

  // ---------- load slider ----------
  var slider = document.getElementById("loadSlider");
  var codePanel = document.getElementById("loadCode");
  var readout = document.getElementById("loadReadout");
  if (slider) {
    slider.addEventListener("input", function () {
      codePanel.style.setProperty("--load", String(slider.value / 100));
      readout.textContent = slider.value + "%";
    });
  }

  // ---------- checklist persistence ----------
  var boxes = document.querySelectorAll("#ritualChecklist input[type=checkbox]");
  try {
    var savedChecks = JSON.parse(localStorage.getItem(CHECK_KEY) || "{}");
    boxes.forEach(function (b) { if (savedChecks[b.dataset.key]) b.checked = true; });
  } catch (e) { /* ignore */ }
  boxes.forEach(function (b) {
    b.addEventListener("change", function () {
      var state = {};
      boxes.forEach(function (x) { state[x.dataset.key] = x.checked; });
      try { localStorage.setItem(CHECK_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
    });
  });

  // ---------- note creation ----------
  function sectionOf(el) {
    while (el && el !== document.body) {
      if (el.tagName === "SECTION" && el.dataset.section) return el;
      el = el.parentElement;
    }
    return null;
  }

  function openForm(section, quote) {
    closeForm();
    var form = document.createElement("div");
    form.className = "note-form";
    form.id = "activeNoteForm";
    if (quote) {
      var q = document.createElement("div");
      q.className = "nf-quote";
      q.textContent = quote;
      form.appendChild(q);
    }
    var ta = document.createElement("textarea");
    ta.placeholder = "Your note… (saved only in your browser until you export)";
    form.appendChild(ta);
    var row = document.createElement("div");
    row.className = "nf-row";
    var saveBtn = document.createElement("button");
    saveBtn.className = "nf-save"; saveBtn.type = "button"; saveBtn.textContent = "Save note";
    var cancelBtn = document.createElement("button");
    cancelBtn.className = "nf-cancel"; cancelBtn.type = "button"; cancelBtn.textContent = "Cancel";
    row.appendChild(saveBtn); row.appendChild(cancelBtn);
    form.appendChild(row);
    section.appendChild(form);
    ta.focus();
    saveBtn.addEventListener("click", function () {
      var body = ta.value.trim();
      if (!body && !quote) { closeForm(); return; }
      notes.push({ id: String(notes.length) + "." + String((notes[notes.length-1]||{}).id||""), section: section.dataset.section, quote: quote || "", body: body, });
      save(notes);
      render();
      closeForm();
    });
    cancelBtn.addEventListener("click", closeForm);
  }
  function closeForm() {
    var f = document.getElementById("activeNoteForm");
    if (f) f.remove();
  }

  document.querySelectorAll(".note-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var section = sectionOf(btn);
      if (section) openForm(section, "");
    });
  });

  // ---------- selection annotate ----------
  var selBtn = document.getElementById("selNoteBtn");
  var pendingQuote = "";
  var pendingSection = null;
  document.addEventListener("mouseup", function (e) {
    if (e.target === selBtn || selBtn.contains(e.target)) return;
    setTimeout(function () {
      var sel = window.getSelection();
      var text = sel ? String(sel).trim() : "";
      var inForm = document.getElementById("activeNoteForm");
      if (!text || text.length < 3 || (inForm && inForm.contains(e.target))) {
        selBtn.style.display = "none";
        return;
      }
      var node = sel.anchorNode && sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
      var section = sectionOf(node);
      if (!section) { selBtn.style.display = "none"; return; }
      var rect = sel.getRangeAt(0).getBoundingClientRect();
      pendingQuote = text.length > 240 ? text.slice(0, 240) + "…" : text;
      pendingSection = section;
      selBtn.style.display = "block";
      selBtn.style.left = Math.max(8, rect.left + window.scrollX + rect.width / 2 - 70) + "px";
      selBtn.style.top = (rect.bottom + window.scrollY + 8) + "px";
    }, 10);
  });
  selBtn.addEventListener("click", function () {
    selBtn.style.display = "none";
    if (pendingSection) openForm(pendingSection, pendingQuote);
    var sel = window.getSelection();
    if (sel) sel.removeAllRanges();
  });

  // ---------- render note cards + tray ----------
  function render() {
    document.querySelectorAll(".note-card").forEach(function (c) { c.remove(); });
    notes.forEach(function (n, i) {
      var section = document.querySelector('section[data-section="' + n.section.replace(/"/g, '\\"') + '"]');
      if (!section) return;
      var card = document.createElement("div");
      card.className = "note-card";
      if (n.quote) {
        var q = document.createElement("div"); q.className = "nc-quote"; q.textContent = n.quote; card.appendChild(q);
      }
      if (n.body) {
        var b = document.createElement("div"); b.className = "nc-body"; b.textContent = n.body; card.appendChild(b);
      }
      var meta = document.createElement("div"); meta.className = "nc-meta";
      var tag = document.createElement("span"); tag.className = "nc-tag"; tag.textContent = "your note";
      var del = document.createElement("button"); del.className = "nc-del"; del.type = "button"; del.textContent = "delete";
      del.addEventListener("click", function () { notes.splice(i, 1); save(notes); render(); });
      meta.appendChild(tag); meta.appendChild(del);
      card.appendChild(meta);
      section.appendChild(card);
    });
    document.getElementById("noteCount").textContent = String(notes.length);
    document.getElementById("drawerSub").textContent = notes.length + (notes.length === 1 ? " note" : " notes") + " · copy and send back to Aasim";
    document.getElementById("drawerText").value = exportMd();
  }

  function exportMd() {
    if (!notes.length) return "No notes yet — select text in the essay or use a ＋ Note button.";
    var out = ['## Feedback on "Your Startup Isn’t Slow. It’s Blind." (draft)', ""];
    var bySection = {};
    notes.forEach(function (n) {
      (bySection[n.section] = bySection[n.section] || []).push(n);
    });
    Object.keys(bySection).forEach(function (s) {
      out.push("### " + s);
      bySection[s].forEach(function (n) {
        if (n.quote) out.push("> " + n.quote);
        if (n.body) out.push(n.body);
        out.push("");
      });
    });
    return out.join("\n");
  }

  // ---------- drawer ----------
  var drawer = document.getElementById("drawer");
  var trayBtn = document.getElementById("trayBtn");
  trayBtn.addEventListener("click", function () { render(); drawer.classList.add("open"); });
  document.getElementById("drawerClose").addEventListener("click", function () { drawer.classList.remove("open"); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") { drawer.classList.remove("open"); closeForm(); selBtn.style.display = "none"; }
  });

  document.getElementById("copyNotes").addEventListener("click", function (e) {
    var text = exportMd();
    var btn = e.currentTarget;
    function done(ok) {
      var prev = btn.textContent;
      btn.textContent = ok ? "Copied ✓" : "Select & copy manually";
      setTimeout(function () { btn.textContent = prev; }, 1600);
      if (!ok) { var ta = document.getElementById("drawerText"); ta.focus(); ta.select(); }
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { done(true); }, function () { done(false); });
    } else { done(false); }
  });
  document.getElementById("clearNotes").addEventListener("click", function () {
    notes = []; save(notes); render();
  });

  // reset hatch
  window.__ibrev = {
    clearAll: function () { notes = []; save(notes); render(); },
    exportState: function () { return JSON.stringify(notes); },
    importState: function (json) { notes = JSON.parse(json); save(notes); render(); },
  };

  render();
})();

}
</script>
</body>
</html>
